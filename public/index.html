<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="glass-bg"></div>
  
  <div class="container" id="mainView">
    <h1>✨ 待办事项</h1>
    <p class="subtitle">记录今天要完成的任务</p>
    
    <div class="top-actions">
      <button class="btn-achievement" onclick="showAchievements()">
        <span>🏅</span> 成就
      </button>
    </div>
    
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-icon">🔥</span>
        <span class="stat-value" id="streakCount">0</span>
        <span class="stat-label">天连续</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">⭐</span>
        <span class="stat-value" id="totalCount">0</span>
        <span class="stat-label">今日完成</span>
      </div>
    </div>
    
    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressBar"></div>
      </div>
      <span class="progress-text" id="progressText">0%</span>
    </div>
    
    <div class="card glass-card">
      <div class="input-section">
        <div class="input-wrapper">
          <input type="text" id="todoInput" placeholder="添加新的待办...">
          <button class="btn-add" onclick="addTodo()">添加</button>
        </div>
      </div>
      
      <div class="stats">
        <span id="pendingCount">0 项待完成</span>
        <span id="completedCount">0 项已完成</span>
      </div>
      
      <ul id="todoList"></ul>
      
      <button class="clear-btn" onclick="clearCompleted()">清除已完成</button>
    </div>
  </div>

  <div class="modal-overlay" id="achievementModal">
    <div class="modal-content achievement-modal glass-card">
      <div class="modal-header">
        <h2>🏅 我的成就</h2>
        <button class="modal-close" onclick="closeAchievements()">✕</button>
      </div>
      
      <div class="achievement-summary">
        <div class="summary-item">
          <span class="summary-value" id="modalTotalCount">0</span>
          <span class="summary-label">已解锁</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-item">
          <span class="summary-value" id="modalLockedCount">7</span>
          <span class="summary-label">未解锁</span>
        </div>
      </div>
      
      <div class="achievement-grid" id="achievementGrid"></div>
    </div>
  </div>

  <script type="module" src="js/api/config.js"></script>
  <script type="module" src="js/api/api.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
